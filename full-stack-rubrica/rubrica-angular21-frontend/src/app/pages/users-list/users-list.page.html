<div class="container">
  <h2>Lista Utenti del Sistema</h2>
  <table class="table">
    <thead>
      <tr>
        <th>Nome</th>
        <th>Email</th>
        <th>Telefono</th>
      </tr>
    </thead>
    <tbody>
      @for(user of users(); track user.id) {
        <tr>
          <td>{{ user.nomeCompleto }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.phoneNumber || 'N/A' }}</td>
        </tr>
      } @empty {
        <tr><td colspan="3">Nessun utente trovato.</td></tr>
      }
    </tbody>
  </table>
</div>
